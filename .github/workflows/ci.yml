name: CI Pipeline

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  # 🧪 TEST JOB (runs on PR + push)
  test:
    runs-on: ubuntu-latest

    env:
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      #   # caching layer. with caching we use a prebuilt image in the ci pipeline which reduces the time by 30 -70 %

      # - name: Build backend image (with cache)
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ./backend
      #     target: test
      #     load: true
      #     tags: backend:test
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=min

      - name: Run tests
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml up --abort-on-container-exit --exit-code-from backend
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  # 🚀 BUILD & PUSH JOB (ONLY after merge)
  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, frontend]

    #  THIS IS THE MAGIC LINE
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t balajichakari/auth-service-express:latest ./backend

      - name: Push Docker image
        run: |
          docker push balajichakari/auth-service-express:latest

