name: CI Pipeline

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    env:
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      # 1. Get code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Run tests using Docker Compose

      # - name: Run tests (Docker Compose)
      #   run: |
      #     docker compose down -v || true
      #     docker compose up --build --abort-on-container-exit --exit-code-from backend
      #   env:
      #     JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

      - name: Run tests
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml up \--abort-on-container-exit \--exit-code-from backend
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

      # 4. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN}}

      # 5. Build image
      - name: Build Docker image
        run: |
          docker build -t balajichakari/auth-service-express:latest ./backend

      # 6. Push image
      - name: Push Docker image
        run: |
          docker push balajichakari/auth-service-express:latest

